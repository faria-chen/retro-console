<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>🎮 复古掌机</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:'Press Start 2P',monospace}

/* ====== BOOT ====== */
#boot{position:fixed;inset:0;z-index:200;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s}
#boot.hide{opacity:0;pointer-events:none}
#boot h1{font-size:clamp(1rem,4vw,1.6rem);color:#9bbc0f;text-shadow:0 0 20px rgba(155,188,15,0.5);line-height:2;margin-bottom:30px;text-align:center}
#boot .prompt{color:#306230;font-size:0.6rem;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}

/* ====== MENU ====== */
#menu{position:fixed;inset:0;z-index:100;background:#111;display:none;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;padding:20px 0}
#menu.show{display:flex}
#menu h2{font-size:0.8rem;color:#9bbc0f;margin-bottom:24px;text-shadow:0 0 10px rgba(155,188,15,0.3)}
.glist{display:flex;flex-direction:column;gap:12px;width:min(90%,360px)}
.gitem{
  background:#1a1a1a;border:2px solid #333;border-radius:10px;
  padding:16px 18px;display:flex;align-items:center;gap:16px;
  cursor:pointer;transition:all 0.15s;
}
.gitem:active,.gitem:hover{background:#222;border-color:#9bbc0f;transform:scale(0.98)}
.gitem .gi{font-size:1.6rem;width:40px;text-align:center}
.gitem .gt{font-size:0.5rem;color:#ccc;line-height:1.6}
.gitem .gt b{color:#9bbc0f;display:block;margin-bottom:3px;font-size:0.55rem}

/* ====== GAME SHELL ====== */
#shell{display:none;width:100%;height:100%;flex-direction:column;align-items:center;justify-content:center;background:#111;position:relative}
#shell.active{display:flex}

.topbar{position:absolute;top:0;left:0;right:0;height:30px;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 10px;background:rgba(0,0,0,0.85)}
.topbar .back{color:#888;font-size:0.45rem;cursor:pointer;padding:6px 12px;border:1px solid #444;border-radius:6px;background:none;font-family:inherit}
.topbar .back:active{background:#333}
.topbar .score{color:#9bbc0f;font-size:0.45rem;text-shadow:0 0 6px rgba(155,188,15,0.3);white-space:nowrap}

/* Screen area */
.scr-area{flex:1;display:flex;align-items:center;justify-content:center;width:100%;padding:30px 0 4px}
#gc{image-rendering:pixelated;image-rendering:crisp-edges;border:3px solid #333;border-radius:4px;background:#000;box-shadow:0 0 20px rgba(0,0,0,0.5)}

/* ====== CONTROLS — BIG BUTTONS ====== */
.ctrl{width:100%;display:flex;justify-content:space-between;align-items:center;padding:6px 10px 10px;flex-shrink:0}

/* D-Pad */
.dp{position:relative;width:140px;height:140px}
.db{position:absolute;display:flex;align-items:center;justify-content:center;background:#222;border:2px solid #555;color:#888;font-size:1.2rem;cursor:pointer;transition:background 0.05s;border-radius:8px}
.db:active,.db.on{background:#555;color:#fff}
.du{top:0;left:42px;width:56px;height:46px;border-radius:10px 10px 4px 4px}
.dd{bottom:0;left:42px;width:56px;height:46px;border-radius:4px 4px 10px 10px}
.dl{top:46px;left:0;width:46px;height:48px;border-radius:10px 4px 4px 10px}
.dr{top:46px;right:0;width:46px;height:48px;border-radius:4px 10px 10px 4px}
.dc{top:46px;left:46px;width:48px;height:48px;background:#1a1a1a;border:none;pointer-events:none;border-radius:4px}

/* Action buttons */
.ab{display:flex;flex-direction:column;align-items:center;gap:8px}
.ab-top{display:flex;gap:12px}
.btn{
  border:none;font-family:inherit;cursor:pointer;color:#fff;
  box-shadow:0 4px 0 rgba(0,0,0,0.4);transition:transform 0.05s,box-shadow 0.05s;
  display:flex;align-items:center;justify-content:center;
}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,0.4)}
.ba{width:56px;height:56px;border-radius:50%;background:#c0392b;font-size:0.6rem}
.bb{width:56px;height:56px;border-radius:50%;background:#2980b9;font-size:0.6rem}
.bp{width:80px;height:32px;border-radius:16px;background:#27ae60;font-size:0.4rem}

/* Pause overlay */
#pause{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.75)}
#pause.show{display:flex}
#pause span{font-size:0.8rem;color:#9bbc0f;animation:blink 1s step-end infinite}

/* Small screens */
@media(max-height:500px){
  .dp{width:120px;height:120px}
  .du,.dd{width:48px;height:38px;left:36px}
  .dl,.dr{width:38px;height:44px;top:38px}
  .dl{left:0}.dr{right:0}.du{top:0}.dd{bottom:0}
  .dc{top:38px;left:38px;width:44px;height:44px}
  .ba,.bb{width:48px;height:48px}
  .bp{width:68px;height:28px}
  .ctrl{padding:4px 8px 6px}
}
</style>
</head>
<body>

<div id="boot"><h1>🎮 复古掌机<br>游戏盒子</h1><div class="prompt">TAP TO START</div></div>

<div id="menu"><h2>— SELECT GAME —</h2><div class="glist">
  <div class="gitem" data-g="snake"><div class="gi">🐍</div><div class="gt"><b>SNAKE</b>经典贪吃蛇</div></div>
  <div class="gitem" data-g="tetris"><div class="gi">🧱</div><div class="gt"><b>TETRIS</b>俄罗斯方块</div></div>
  <div class="gitem" data-g="tank"><div class="gi">🎯</div><div class="gt"><b>TANK</b>坦克大战</div></div>
  <div class="gitem" data-g="sokoban"><div class="gi">📦</div><div class="gt"><b>SOKOBAN</b>推箱子</div></div>
</div></div>

<div id="shell">
  <div class="topbar">
    <button class="back" id="backBtn">◀ MENU</button>
    <div class="score" id="hud"></div>
  </div>
  <div class="scr-area"><canvas id="gc"></canvas></div>
  <div class="ctrl">
    <div class="dp">
      <div class="db du" data-k="up">▲</div>
      <div class="db dd" data-k="down">▼</div>
      <div class="db dl" data-k="left">◀</div>
      <div class="db dr" data-k="right">▶</div>
      <div class="dc"></div>
    </div>
    <div class="ab">
      <div class="ab-top">
        <button class="btn bb" data-k="b">B</button>
        <button class="btn ba" data-k="a">A</button>
      </div>
      <button class="btn bp" data-k="start">PAUSE</button>
    </div>
  </div>
  <div id="pause"><span>⏸ PAUSED</span></div>
</div>

<script>
// ================================================================
//  AUDIO
// ================================================================
var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function beep(f,d,v,t){if(!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||'square';o.frequency.value=f;g.gain.setValueAtTime(v||0.08,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
function sfxEat(){beep(880,0.08,0.1);setTimeout(function(){beep(1100,0.08,0.1)},60)}
function sfxDie(){beep(200,0.3,0.12,'sawtooth');setTimeout(function(){beep(150,0.3,0.1,'sawtooth')},150)}
function sfxShoot(){beep(600,0.05,0.06)}
function sfxHit(){beep(300,0.1,0.1,'sawtooth')}
function sfxMove(){beep(200,0.03,0.03)}
function sfxPush(){beep(150,0.06,0.06,'triangle')}
function sfxWin(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){beep(f,0.15,0.1)},i*100)})}
function sfxStart(){[262,330,392,523].forEach(function(f,i){setTimeout(function(){beep(f,0.12,0.08)},i*80)})}

// ================================================================
//  INPUT
// ================================================================
var K={up:0,down:0,left:0,right:0,a:0,b:0,start:0};
var KJ={};
function resetKJ(){KJ={}}
function bindInput(){
  document.querySelectorAll('[data-k]').forEach(function(el){
    var k=el.getAttribute('data-k');
    function dn(e){e.preventDefault();K[k]=1;el.classList.add('on');KJ[k]=1}
    function up(e){e.preventDefault();K[k]=0;el.classList.remove('on')}
    el.addEventListener('touchstart',dn,{passive:false});
    el.addEventListener('touchend',up,{passive:false});
    el.addEventListener('touchcancel',up,{passive:false});
    el.addEventListener('mousedown',dn);
    el.addEventListener('mouseup',up);
    el.addEventListener('mouseleave',up);
  });
  var km={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',
    w:'up',s:'down',a:'left',d:'right',z:'a',j:'a',x:'b',k:'b',Enter:'start',p:'start',' ':'start'};
  document.addEventListener('keydown',function(e){var k=km[e.key];if(k){K[k]=1;KJ[k]=1;e.preventDefault()}});
  document.addEventListener('keyup',function(e){var k=km[e.key];if(k){K[k]=0;e.preventDefault()}});
}

// ================================================================
//  ENGINE
// ================================================================
var C=document.getElementById('gc'),X=C.getContext('2d');
var W=256,H=240;
var cur=null,rAF=null,paused=false;

function resize(){
  var mh=window.innerHeight-160,mw=window.innerWidth-20;
  var s=Math.min(mw/W,mh/H);s=Math.max(s,1);
  var is=Math.floor(s);if(is<1)is=1;
  C.width=W;C.height=H;
  C.style.width=(W*is)+'px';C.style.height=(H*is)+'px';
}

function toMenu(){
  if(rAF)cancelAnimationFrame(rAF);cur=null;
  document.getElementById('shell').classList.remove('active');
  document.getElementById('menu').classList.add('show');
}

function launch(id){
  initAudio();sfxStart();
  document.getElementById('menu').classList.remove('show');
  document.getElementById('shell').classList.add('active');
  resize();paused=false;
  document.getElementById('pause').classList.remove('show');
  if(rAF)cancelAnimationFrame(rAF);
  switch(id){
    case'snake':cur=new Snake();break;
    case'tetris':cur=new Tetris();break;
    case'tank':cur=new Tank();break;
    case'sokoban':cur=new Sokoban();break;
  }
  cur.init();tick();
}

function tick(){
  if(KJ.start){paused=!paused;document.getElementById('pause').classList.toggle('show',paused)}
  if(!paused&&cur){cur.update();cur.draw()}
  document.getElementById('hud').textContent=cur&&cur.hud?cur.hud():'';
  resetKJ();
  rAF=requestAnimationFrame(tick);
}

// ================================================================
//  SNAKE
// ================================================================
function Snake(){}
Snake.prototype.init=function(){
  this.grid=16;this.snake=[{x:8,y:8},{x:7,y:8},{x:6,y:8}];
  this.dir={x:1,y:0};this.ndir={x:1,y:0};
  this.food=this.spawn();this.sc=0;this.spd=160;this.lt=0;this.alive=true;
};
Snake.prototype.spawn=function(){
  var p,s=this.snake;
  do{p={x:Math.floor(Math.random()*this.grid),y:Math.floor(Math.random()*this.grid)}}
  while(s.some(function(v){return v.x===p.x&&v.y===p.y}));
  return p;
};
Snake.prototype.update=function(){
  if(!this.alive){if(KJ.a||KJ.b)this.init();return}
  var now=performance.now();if(now-this.lt<this.spd)return;this.lt=now;
  if(K.up&&this.dir.y!==1)this.ndir={x:0,y:-1};
  else if(K.down&&this.dir.y!==-1)this.ndir={x:0,y:1};
  else if(K.left&&this.dir.x!==1)this.ndir={x:-1,y:0};
  else if(K.right&&this.dir.x!==-1)this.ndir={x:1,y:0};
  this.dir=this.ndir;
  var h={x:this.snake[0].x+this.dir.x,y:this.snake[0].y+this.dir.y};
  if(h.x<0||h.x>=this.grid||h.y<0||h.y>=this.grid||this.snake.some(function(v){return v.x===h.x&&v.y===h.y})){
    this.alive=false;sfxDie();return;
  }
  this.snake.unshift(h);
  if(h.x===this.food.x&&h.y===this.food.y){this.sc+=10;sfxEat();this.food=this.spawn();if(this.spd>90)this.spd-=1}
  else this.snake.pop();
};
Snake.prototype.hud=function(){return 'SCORE '+this.sc};
Snake.prototype.draw=function(){
  var g=this.grid,cw=W/g,ch=H/g;
  X.fillStyle='#0f380f';X.fillRect(0,0,W,H);
  X.strokeStyle='rgba(48,98,48,0.4)';X.lineWidth=0.5;
  for(var i=0;i<=g;i++){X.beginPath();X.moveTo(i*cw,0);X.lineTo(i*cw,H);X.stroke();X.beginPath();X.moveTo(0,i*ch);X.lineTo(W,i*ch);X.stroke()}
  var pulse=Math.sin(performance.now()/200)*2;
  X.fillStyle='#e74c3c';X.beginPath();X.arc(this.food.x*cw+cw/2,this.food.y*ch+ch/2,cw*0.35+pulse,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(231,76,60,0.3)';X.beginPath();X.arc(this.food.x*cw+cw/2,this.food.y*ch+ch/2,cw*0.5+pulse,0,Math.PI*2);X.fill();
  var self=this;
  this.snake.forEach(function(s,i){
    X.fillStyle=i===0?'#8bac0f':'#9bbc0f';
    X.fillRect(s.x*cw+1,s.y*ch+1,cw-2,ch-2);
    X.fillStyle='rgba(255,255,255,0.15)';X.fillRect(s.x*cw+1,s.y*ch+1,cw-2,2);
    if(i===0){
      X.fillStyle='#0f380f';
      var dx=self.dir.x,dy=self.dir.y;
      var ex1=s.x*cw+cw*0.3,ey1=s.y*ch+ch*0.3,ex2=s.x*cw+cw*0.6,ey2=s.y*ch+ch*0.3;
      if(dx===1){ex1=ex2=s.x*cw+cw*0.65;ey1=s.y*ch+ch*0.25;ey2=s.y*ch+ch*0.55}
      if(dx===-1){ex1=ex2=s.x*cw+cw*0.35;ey1=s.y*ch+ch*0.25;ey2=s.y*ch+ch*0.55}
      if(dy===-1){ey1=ey2=s.y*ch+ch*0.35;ex1=s.x*cw+cw*0.25;ex2=s.x*cw+cw*0.55}
      if(dy===1){ey1=ey2=s.y*ch+ch*0.65;ex1=s.x*cw+cw*0.25;ex2=s.x*cw+cw*0.55}
      X.fillRect(ex1,ey1,3,3);X.fillRect(ex2,ey2,3,3);
    }
  });
  if(!this.alive){
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,0,W,H);
    X.fillStyle='#e74c3c';X.font='16px "Press Start 2P"';X.textAlign='center';
    X.fillText('GAME OVER',W/2,H/2-16);
    X.fillStyle='#9bbc0f';X.font='8px "Press Start 2P"';X.fillText('PRESS A/B',W/2,H/2+8);
  }
};

// ================================================================
//  TETRIS — full width
// ================================================================
function Tetris(){}
var TSHAPES=[
  {s:[[1,1,1,1]],c:'#00f0f0'},
  {s:[[1,1],[1,1]],c:'#f0f000'},
  {s:[[0,1,0],[1,1,1]],c:'#a000f0'},
  {s:[[0,1,1],[1,1,0]],c:'#00f000'},
  {s:[[1,1,0],[0,1,1]],c:'#f00000'},
  {s:[[1,0,0],[1,1,1]],c:'#f0a000'},
  {s:[[0,0,1],[1,1,1]],c:'#0000f0'},
];
Tetris.prototype.init=function(){
  this.cols=12;this.rows=20;
  this.cell=Math.floor(W/this.cols);
  this.brd=[];for(var r=0;r<this.rows;r++){this.brd[r]=[];for(var c=0;c<this.cols;c++)this.brd[r][c]=0}
  this.sc=0;this.lv=1;this.lines=0;this.alive=true;
  this.spawn();this.dt=performance.now();this.di=800;
};
Tetris.prototype.spawn=function(){
  var i=Math.floor(Math.random()*TSHAPES.length);
  this.pc={s:TSHAPES[i].s.map(function(r){return r.slice()}),c:TSHAPES[i].c,x:4,y:0};
};
Tetris.prototype.fits=function(s,px,py){
  for(var r=0;r<s.length;r++)for(var c=0;c<s[r].length;c++){
    if(!s[r][c])continue;var nx=px+c,ny=py+r;
    if(nx<0||nx>=this.cols||ny>this.rows)return false;
    if(ny>=0&&this.brd[ny][nx])return false;
  }return true;
};
Tetris.prototype.lock=function(){
  var s=this.pc.s;
  for(var r=0;r<s.length;r++)for(var c=0;c<s[r].length;c++){
    if(!s[r][c])continue;var ny=this.pc.y+r;
    if(ny<0){this.alive=false;sfxDie();return}
    this.brd[ny][this.pc.x+c]=this.pc.c;
  }
  var cl=0;
  for(var r=this.rows-1;r>=0;r--){
    var full=true;for(var c=0;c<this.cols;c++)if(!this.brd[r][c]){full=false;break}
    if(full){this.brd.splice(r,1);var nr=[];for(var c=0;c<this.cols;c++)nr.push(0);this.brd.unshift(nr);cl++;r++}
  }
  if(cl>0){this.lines+=cl;this.sc+=[0,100,300,500,800][cl]*this.lv;this.lv=Math.floor(this.lines/10)+1;this.di=Math.max(80,800-this.lv*60);sfxWin()}
  this.spawn();
};
Tetris.prototype.rotate=function(){
  var s=this.pc.s,rows=s.length,cols=s[0].length,r=[];
  for(var c=0;c<cols;c++){r[c]=[];for(var rw=rows-1;rw>=0;rw--)r[c][rows-1-rw]=s[rw][c]}
  if(this.fits(r,this.pc.x,this.pc.y))this.pc.s=r;
  else if(this.fits(r,this.pc.x-1,this.pc.y)){this.pc.s=r;this.pc.x--}
  else if(this.fits(r,this.pc.x+1,this.pc.y)){this.pc.s=r;this.pc.x++}
};
Tetris.prototype.update=function(){
  if(!this.alive){if(KJ.a||KJ.b)this.init();return}
  var now=performance.now();
  if(KJ.a)this.rotate();
  if(KJ.left&&this.fits(this.pc.s,this.pc.x-1,this.pc.y)){this.pc.x--;sfxMove()}
  if(KJ.right&&this.fits(this.pc.s,this.pc.x+1,this.pc.y)){this.pc.x++;sfxMove()}
  var iv=K.down?50:this.di;
  if(now-this.dt>iv){this.dt=now;if(this.fits(this.pc.s,this.pc.x,this.pc.y+1)){this.pc.y++;if(K.down)this.sc++}else this.lock()}
};
Tetris.prototype.hud=function(){return 'SCORE '+this.sc+'  LV'+this.lv};
Tetris.prototype.draw=function(){
  var c=this.cell;
  X.fillStyle='#0f380f';X.fillRect(0,0,W,H);
  X.strokeStyle='rgba(48,98,48,0.3)';
  for(var r=0;r<=this.rows;r++){X.beginPath();X.moveTo(0,r*c);X.lineTo(this.cols*c,r*c);X.stroke()}
  for(var col=0;col<=this.cols;col++){X.beginPath();X.moveTo(col*c,0);X.lineTo(col*c,this.rows*c);X.stroke()}
  for(var r=0;r<this.rows;r++)for(var col=0;col<this.cols;col++){
    if(this.brd[r][col]){
      X.fillStyle=this.brd[r][col];X.fillRect(col*c+1,r*c+1,c-2,c-2);
      X.fillStyle='rgba(255,255,255,0.2)';X.fillRect(col*c+1,r*c+1,c-2,3);
      X.fillStyle='rgba(0,0,0,0.15)';X.fillRect(col*c+1,r*c+c-3,c-2,2);
    }
  }
  if(this.alive){
    var s=this.pc.s;
    for(var r=0;r<s.length;r++)for(var col=0;col<s[r].length;col++){
      if(!s[r][col])continue;
      var px=(this.pc.x+col)*c,py=(this.pc.y+r)*c;
      X.fillStyle=this.pc.c;X.fillRect(px+1,py+1,c-2,c-2);
      X.fillStyle='rgba(255,255,255,0.25)';X.fillRect(px+1,py+1,c-2,3);
    }
    var gy=this.pc.y;
    while(this.fits(this.pc.s,this.pc.x,gy+1))gy++;
    if(gy!==this.pc.y){
      X.globalAlpha=0.2;
      for(var r=0;r<s.length;r++)for(var col=0;col<s[r].length;col++){
        if(!s[r][col])continue;
        X.fillStyle=this.pc.c;X.fillRect((this.pc.x+col)*c+1,(gy+r)*c+1,c-2,c-2);
      }
      X.globalAlpha=1;
    }
  }
  if(!this.alive){
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,0,W,H);
    X.fillStyle='#e74c3c';X.font='16px "Press Start 2P"';X.textAlign='center';
    X.fillText('GAME OVER',W/2,H/2-16);
    X.fillStyle='#9bbc0f';X.font='8px "Press Start 2P"';X.fillText('PRESS A/B',W/2,H/2+8);
  }
};

// ================================================================
//  TANK — bigger tiles
// ================================================================
function Tank(){}
Tank.prototype.init=function(){
  this.ts=16;this.mw=Math.floor(W/this.ts);this.mh=Math.floor(H/this.ts);
  this.map=[];
  for(var r=0;r<this.mh;r++){this.map[r]=[];for(var c=0;c<this.mw;c++)this.map[r][c]=0}
  for(var r=2;r<this.mh-2;r+=2)for(var c=1;c<this.mw-1;c+=2)if(Math.random()<0.5)this.map[r][c]=1;
  var bc=Math.floor(this.mw/2);
  this.map[this.mh-2][bc-1]=1;this.map[this.mh-2][bc]=5;this.map[this.mh-2][bc+1]=1;
  this.map[this.mh-3][bc-1]=1;this.map[this.mh-3][bc]=1;this.map[this.mh-3][bc+1]=1;
  for(var i=0;i<3;i++){var sr=3+Math.floor(Math.random()*(this.mh-6)),sc=Math.floor(Math.random()*this.mw);this.map[sr][sc]=2}

  this.pl={x:bc*this.ts,y:(this.mh-4)*this.ts,dir:0,alive:true,cd:0};
  this.ens=[];this.buls=[];this.sc=0;this.base=true;
  this.st=0;this.maxE=3;this.totalE=0;this.maxTotal=8;
  this.spawnE();
};
Tank.prototype.spawnE=function(){
  if(this.ens.length>=this.maxE||this.totalE>=this.maxTotal)return;
  var spots=[{x:0,y:0},{x:Math.floor(this.mw/2)*this.ts,y:0},{x:(this.mw-2)*this.ts,y:0}];
  var sp=spots[Math.floor(Math.random()*spots.length)];
  this.ens.push({x:sp.x,y:sp.y,dir:2,alive:true,ai:Math.random()*500,cd:0});
  this.totalE++;
};
Tank.prototype.wallHit=function(x,y,sz){
  var ts=this.ts,c1=Math.floor(x/ts),r1=Math.floor(y/ts),c2=Math.floor((x+sz-1)/ts),r2=Math.floor((y+sz-1)/ts);
  for(var r=r1;r<=r2;r++)for(var c=c1;c<=c2;c++){
    if(r<0||r>=this.mh||c<0||c>=this.mw)return true;
    var t=this.map[r][c];if(t===1||t===2||t===3)return true;
  }return false;
};
Tank.prototype.fire=function(tk,isp){
  if(tk.cd>0)return;
  var ts=this.ts,spd=4;
  var dx=[0,0,-1,1][tk.dir]*spd,dy=[-1,1,0,0][tk.dir]*spd;
  this.buls.push({x:tk.x+ts/2-2,y:tk.y+ts/2-2,dx:dx,dy:dy,isp:isp});
  tk.cd=18;sfxShoot();
};
Tank.prototype.update=function(){
  var ts=this.ts,p=this.pl;
  if(!p.alive||!this.base){if(KJ.a||KJ.b)this.init();return}
  var nd=-1;
  if(K.up)nd=0;else if(K.down)nd=1;else if(K.left)nd=2;else if(K.right)nd=3;
  if(nd>=0){
    p.dir=nd;var spd=2;
    var nx=p.x+[0,0,-spd,spd][nd],ny=p.y+[-spd,spd,0,0][nd];
    nx=Math.max(0,Math.min(nx,(this.mw-2)*ts));ny=Math.max(0,Math.min(ny,(this.mh-2)*ts));
    if(!this.wallHit(nx,ny,ts)){p.x=nx;p.y=ny}
  }
  if(K.a)this.fire(p,true);
  if(p.cd>0)p.cd--;
  var self=this;
  this.ens.forEach(function(e){
    if(!e.alive)return;
    e.ai--;if(e.ai<=0){e.dir=Math.floor(Math.random()*4);e.ai=100+Math.random()*200}
    var spd=1.2;
    var nx=e.x+[0,0,-spd,spd][e.dir],ny=e.y+[-spd,spd,0,0][e.dir];
    nx=Math.max(0,Math.min(nx,(self.mw-2)*ts));ny=Math.max(0,Math.min(ny,(self.mh-2)*ts));
    if(!self.wallHit(nx,ny,ts)){e.x=nx;e.y=ny}else{e.dir=Math.floor(Math.random()*4);e.ai=50}
    if(Math.random()<0.012)self.fire(e,false);
    if(e.cd>0)e.cd--;
  });
  for(var i=this.buls.length-1;i>=0;i--){
    var b=this.buls[i];b.x+=b.dx;b.y+=b.dy;
    if(b.x<0||b.x>W||b.y<0||b.y>H){this.buls.splice(i,1);continue}
    var cr=Math.floor(b.y/ts),cc=Math.floor(b.x/ts);
    if(cr>=0&&cr<this.mh&&cc>=0&&cc<this.mw){
      if(this.map[cr][cc]===1){this.map[cr][cc]=0;this.buls.splice(i,1);sfxHit();continue}
      if(this.map[cr][cc]===2){this.buls.splice(i,1);continue}
      if(this.map[cr][cc]===5){this.base=false;sfxDie();this.buls.splice(i,1);continue}
    }
    if(b.isp){
      for(var j=0;j<this.ens.length;j++){
        var e=this.ens[j];
        if(e.alive&&Math.abs(b.x-e.x-ts/2)<ts/2&&Math.abs(b.y-e.y-ts/2)<ts/2){
          e.alive=false;this.sc+=100;this.buls.splice(i,1);sfxHit();break;
        }
      }
    }else{
      if(Math.abs(b.x-p.x-ts/2)<ts/2&&Math.abs(b.y-p.y-ts/2)<ts/2){p.alive=false;sfxDie();this.buls.splice(i,1)}
    }
  }
  this.ens=this.ens.filter(function(e){return e.alive});
  this.st++;if(this.st>150){this.st=0;this.spawnE()}
};
Tank.prototype.hud=function(){return 'SCORE '+this.sc+(this.base?'':' 💥')};
Tank.prototype.draw=function(){
  var ts=this.ts;
  X.fillStyle='#000';X.fillRect(0,0,W,H);
  for(var r=0;r<this.mh;r++)for(var c=0;c<this.mw;c++){
    var t=this.map[r][c],px=c*ts,py=r*ts;
    if(t===1){X.fillStyle='#6d4c2a';X.fillRect(px,py,ts,ts);X.fillStyle='#8B6914';X.fillRect(px+1,py+1,ts-2,ts-2);X.fillStyle='#a07828';X.fillRect(px+2,py+2,ts-4,3)}
    if(t===2){X.fillStyle='#666';X.fillRect(px,py,ts,ts);X.fillStyle='#888';X.fillRect(px+1,py+1,ts-2,ts-2);X.fillStyle='#aaa';X.fillRect(px+3,py+3,3,3)}
    if(t===5){X.fillStyle=this.base?'#ffd700':'#555';X.fillRect(px,py,ts,ts);X.fillStyle=this.base?'#fff8dc':'#333';X.fillRect(px+3,py+3,ts-6,ts-6)}
  }
  var p=this.pl;
  if(p.alive){
    X.fillStyle='#4CAF50';X.fillRect(p.x+1,p.y+1,ts-2,ts-2);
    X.fillStyle='#81C784';X.fillRect(p.x+3,p.y+3,ts-6,ts-6);
    X.fillStyle='#2E7D32';
    var dx=[ts/2-2,ts/2-2,2,ts-6][p.dir],dy=[2,ts-6,ts/2-2,ts/2-2][p.dir];
    X.fillRect(p.x+dx,p.y+dy,5,5);
  }
  this.ens.forEach(function(e){
    X.fillStyle='#c62828';X.fillRect(e.x+1,e.y+1,ts-2,ts-2);
    X.fillStyle='#ef5350';X.fillRect(e.x+3,e.y+3,ts-6,ts-6);
    X.fillStyle='#b71c1c';
    var dx=[ts/2-2,ts/2-2,2,ts-6][e.dir],dy=[2,ts-6,ts/2-2,ts/2-2][e.dir];
    X.fillRect(e.x+dx,e.y+dy,5,5);
  });
  this.buls.forEach(function(b){X.fillStyle=b.isp?'#ffd700':'#ff5252';X.fillRect(b.x,b.y,5,5)});
  if(!this.pl.alive||!this.base){
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,0,W,H);
    X.fillStyle='#e74c3c';X.font='14px "Press Start 2P"';X.textAlign='center';
    X.fillText(this.base?'GAME OVER':'BASE LOST',W/2,H/2-12);
    X.fillStyle='#9bbc0f';X.font='8px "Press Start 2P"';X.fillText('PRESS A/B',W/2,H/2+8);
  }
};

// ================================================================
//  SOKOBAN (推箱子)
// ================================================================
function Sokoban(){}
// Levels: # wall, . floor, @ player, $ box, * box on target, + player on target, O target, ' ' void
var SOKO_LEVELS=[
  // Level 1
  ['######','#    #','# $  #','#  $.#','# @.O#','######'],
  // Level 2
  ['#######','#     #','# .$. #','# $@$ #','# .$. #','#     #','#######'],
  // Level 3
  ['  ####','###  #','# $  #','#  $.#','# @.O#','#   ##','##### '],
  // Level 4
  ['######','#    #','# $$ #','# .. #','# @  #','######'],
  // Level 5
  ['#######','#  .  #','# $.$ #','#  @  #','# $.$ #','#  .  #','#######'],
  // Level 6
  ['  ####','###  ##','#  $  #','# .$. #','#  $  #','#  @  #','#######'],
  // Level 7
  ['#####','#   ##','# $  #','#  $.#','# @.O#','##  #',' #####'],
  // Level 8
  ['#######','#  .  #','# $$$ #','# .@. #','# $$$ #','#  .  #','#######'],
];
Sokoban.prototype.init=function(){
  this.lv=0;this.moves=0;this.pushes=0;
  this.loadLevel();
};
Sokoban.prototype.loadLevel=function(){
  var raw=SOKO_LEVELS[this.lv%SOKO_LEVELS.length];
  this.rows=raw.length;this.cols=0;
  for(var r=0;r<raw.length;r++)if(raw[r].length>this.cols)this.cols=raw[r].length;
  this.map=[];this.px=0;this.py=0;
  for(var r=0;r<this.rows;r++){
    this.map[r]=[];
    for(var c=0;c<this.cols;c++){
      var ch=raw[r][c]||' ';
      if(ch==='#')this.map[r][c]='W';
      else if(ch==='.')this.map[r][c]='F';
      else if(ch==='$')this.map[r][c]='B';
      else if(ch==='*')this.map[r][c]='T'; // box on target
      else if(ch==='@'){this.map[r][c]='F';this.px=c;this.py=r}
      else if(ch==='O'){this.map[r][c]='G';this.px=c;this.py=r}
      else if(ch==='+'){this.map[r][c]='G';this.px=c;this.py=r}
      else this.map[r][c]=' ';
    }
  }
  // Auto-size
  this.ts=Math.floor(Math.min(W/(this.cols+1),H/(this.rows+2)));
  this.offX=Math.floor((W-this.cols*this.ts)/2);
  this.offY=Math.floor((H-this.rows*this.ts)/2);
};
Sokoban.prototype.isWall=function(r,c){return this.map[r]&&this.map[r][c]==='W'};
Sokoban.prototype.isBox=function(r,c){return this.map[r]&&(this.map[r][c]==='B'||this.map[r][c]==='T')};
Sokoban.prototype.update=function(){
  if(KJ.a){this.init();return} // restart level
  if(KJ.b){
    // Next level (skip)
    this.lv++;this.moves=0;this.pushes=0;this.loadLevel();sfxMove();return;
  }
  var dx=0,dy=0;
  if(KJ.up)dy=-1;else if(KJ.down)dy=1;else if(KJ.left)dx=-1;else if(KJ.right)dx=1;
  if(!dx&&!dy)return;
  var nx=this.px+dx,ny=this.py+dy;
  if(this.isWall(ny,nx))return;
  if(this.isBox(ny,nx)){
    var bx=nx+dx,by=ny+dy;
    if(this.isWall(by,bx)||this.isBox(by,bx))return;
    // Push box
    var boxChar=this.map[ny][nx];
    this.map[ny][nx]=(boxChar==='T')?'G':'F'; // leave target behind
    var destChar=this.map[by][bx];
    this.map[by][bx]=(destChar==='G')?'T':'B'; // put box, check if on target
    this.px=nx;this.py=ny;
    this.pushes++;this.moves++;
    sfxPush();
  }else{
    this.px=nx;this.py=ny;
    this.moves++;
    sfxMove();
  }
  // Check win: no boxes off target
  var won=true;
  for(var r=0;r<this.rows;r++)for(var c=0;c<this.cols;c++){
    if(this.map[r][c]==='B')won=false;
  }
  if(won){
    sfxWin();
    var self=this;
    setTimeout(function(){
      self.lv++;self.moves=0;self.pushes=0;self.loadLevel();
    },800);
  }
};
Sokoban.prototype.hud=function(){return 'LEVEL '+(this.lv+1)+'  MOVES '+this.moves+'  PUSH '+this.pushes};
Sokoban.prototype.draw=function(){
  var ts=this.ts,ox=this.offX,oy=this.offY;
  X.fillStyle='#1a1a2e';X.fillRect(0,0,W,H);
  for(var r=0;r<this.rows;r++)for(var c=0;c<this.cols;c++){
    var t=this.map[r][c],px=ox+c*ts,py=oy+r*ts;
    if(t===' '){X.fillStyle='#111';X.fillRect(px,py,ts,ts)}
    if(t==='W'){X.fillStyle='#555';X.fillRect(px,py,ts,ts);X.fillStyle='#777';X.fillRect(px+1,py+1,ts-2,ts-2);X.fillStyle='#888';X.fillRect(px+2,py+2,ts-4,2)}
    if(t==='F'||t==='G'){X.fillStyle='#2a2a3e';X.fillRect(px,py,ts,ts);X.fillStyle='#333350';X.fillRect(px+1,py+1,ts-2,ts-2)}
    if(t==='G'){X.fillStyle='#e67e22';X.fillRect(px+ts/2-3,py+ts/2-3,6,6);X.fillStyle='#f39c12';X.fillRect(px+ts/2-2,py+ts/2-2,4,4)}
    if(t==='B'){X.fillStyle='#8B6914';X.fillRect(px+2,py+2,ts-4,ts-4);X.fillStyle='#c9a634';X.fillRect(px+3,py+3,ts-6,ts-6);X.fillStyle='#a08030';X.fillRect(px+ts/2-2,py+ts/2-2,4,4)}
    if(t==='T'){X.fillStyle='#27ae60';X.fillRect(px+2,py+2,ts-4,ts-4);X.fillStyle='#2ecc71';X.fillRect(px+3,py+3,ts-6,ts-6);X.fillStyle='#fff';X.fillRect(px+ts/2-2,py+ts/2-2,4,4)}
  }
  // Player
  var ppx=ox+this.px*ts,ppy=oy+this.py*ts;
  X.fillStyle='#3498db';X.fillRect(ppx+2,ppy+2,ts-4,ts-4);
  X.fillStyle='#5dade2';X.fillRect(ppx+3,ppy+3,ts-6,ts-6);
  // Eyes
  X.fillStyle='#fff';X.fillRect(ppx+ts/2-4,ppy+ts/2-4,3,3);X.fillRect(ppx+ts/2+1,ppy+ts/2-4,3,3);
  X.fillStyle='#000';X.fillRect(ppx+ts/2-3,ppy+ts/2-3,2,2);X.fillRect(ppx+ts/2+2,ppy+ts/2-3,2,2);
  // Level complete overlay
  var won=true;
  for(var r=0;r<this.rows;r++)for(var c=0;c<this.cols;c++){if(this.map[r][c]==='B')won=false}
  if(won){
    X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(0,0,W,H);
    X.fillStyle='#2ecc71';X.font='14px "Press Start 2P"';X.textAlign='center';
    X.fillText('LEVEL CLEAR!',W/2,H/2-10);
    X.fillStyle='#9bbc0f';X.font='8px "Press Start 2P"';X.fillText('MOVES '+this.moves, W/2,H/2+10);
  }
};
