<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>🎮 复古掌机 · ROM Loader</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Press Start 2P',monospace}

/* ====== BOOT ====== */
#boot{position:fixed;inset:0;z-index:200;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s}
#boot.hide{opacity:0;pointer-events:none}
#boot h1{font-size:clamp(0.9rem,3.5vw,1.4rem);color:#9bbc0f;text-shadow:0 0 20px rgba(155,188,15,0.5);line-height:2.2;margin-bottom:16px;text-align:center}
#boot .sub{color:#306230;font-size:0.5rem;margin-bottom:30px}
#boot .prompt{color:#306230;font-size:0.6rem;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}

/* ====== MENU ====== */
#menu{position:fixed;inset:0;z-index:100;background:#111;display:none;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;padding:20px}
#menu.show{display:flex}
#menu h2{font-size:0.7rem;color:#9bbc0f;margin-bottom:20px;text-shadow:0 0 10px rgba(155,188,15,0.3)}
.drop-zone{width:min(90%,420px);min-height:180px;border:3px dashed #333;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:28px 20px;transition:all 0.2s;cursor:pointer;position:relative}
.drop-zone .icon+.txt,.drop-zone .txt+.txt{margin-top:14px}
@supports(gap:1px){.drop-zone .icon+.txt,.drop-zone .txt+.txt{margin-top:0}}
.drop-zone.over{border-color:#9bbc0f;background:rgba(155,188,15,0.06);transform:scale(1.02)}
.drop-zone .icon{font-size:2.2rem}
.drop-zone .txt{color:#666;font-size:0.45rem;line-height:2.2;text-align:center}
.drop-zone .txt b{color:#9bbc0f}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.hint{width:min(90%,420px);margin-top:16px;padding:12px 14px;background:#1a1a1a;border-radius:8px;border:1px solid #222}
.hint p{color:#555;font-size:0.35rem;line-height:2}
.hint kbd{background:#333;color:#9bbc0f;padding:1px 5px;border-radius:3px;font-size:0.3rem}
.recent{width:min(90%,420px);margin-top:18px}
.recent h3{font-size:0.45rem;color:#666;margin-bottom:10px}
.rom-list{display:flex;flex-direction:column;gap:8px;max-height:160px;overflow-y:auto}
.rom-list .rom-item+.rom-item{margin-top:8px}
@supports(gap:1px){.rom-list .rom-item+.rom-item{margin-top:0}}
.rom-item{background:#1a1a1a;border:2px solid #333;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.15s}
.rom-item .ri{margin-right:12px}
@supports(gap:1px){.rom-item .ri{margin-right:0}}
.rom-item:active,.rom-item:hover{background:#222;border-color:#9bbc0f;transform:scale(0.98)}
.rom-item .ri{font-size:1.2rem}
.rom-item .rn{font-size:0.42rem;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px}
.rom-item .rs{font-size:0.32rem;color:#666;margin-top:3px}

/* ====== GAME SHELL — TRUE FULLSCREEN ====== */
#shell{display:none;position:fixed;inset:0;z-index:100;background:#000}
#shell.active{display:block}

/* Canvas fills entire viewport */
#emu-container{position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
#emu-container canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}

/* Top bar — fades in/out */
.topbar{
  position:absolute;top:0;left:0;right:0;height:40px;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 max(12px,env(safe-area-inset-left)) 0 max(12px,env(safe-area-inset-right));
  background:linear-gradient(to bottom,rgba(0,0,0,0.85),transparent);
  transition:opacity 0.3s;opacity:0;pointer-events:none;
}
.topbar.show{opacity:1;pointer-events:auto}
.topbar .back{color:#ccc;font-size:0.4rem;cursor:pointer;padding:6px 12px;border:1px solid rgba(255,255,255,0.3);border-radius:8px;background:rgba(0,0,0,0.4);font-family:inherit}
.topbar .back:active{background:rgba(255,255,255,0.15)}
.topbar .info{color:#9bbc0f;font-size:0.35rem;text-shadow:0 1px 4px rgba(0,0,0,0.9);max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Center tap zone to show topbar */
.center-tap{position:absolute;top:0;left:25%;right:25%;height:15%;z-index:45;pointer-events:auto;cursor:pointer}

/* ====== TOUCH CONTROLS — OVERLAY GAMEPAD ====== */
.touch-layer{position:absolute;inset:0;z-index:40;pointer-events:none}

/* D-Pad — bottom left */
.pad-zone{
  position:absolute;bottom:0;left:5%;width:45%;height:60%;
  display:flex;align-items:flex-end;justify-content:flex-start;
  padding:0 0 max(12px,env(safe-area-inset-bottom)) 0;
  pointer-events:none;
}
.dp{position:relative;pointer-events:auto}
@media(orientation:landscape){
  .dp{width:min(48vh,260px);height:min(48vh,260px)}
}
@media(orientation:portrait){
  .dp{width:min(52vw,260px);height:min(52vw,260px)}
}
/* Circular directional disc */
.disc{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:3px solid rgba(255,255,255,0.2);
  touch-action:none;cursor:pointer;
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
}
/* Crosshair lines */
.disc::before,.disc::after{
  content:'';position:absolute;background:rgba(255,255,255,0.08);
}
.disc::before{top:50%;left:10%;right:10%;height:2px;transform:translateY(-50%)}
.disc::after{left:50%;top:10%;bottom:10%;width:2px;transform:translateX(-50%)}
/* Thumb indicator dot */
.disc-dot{
  position:absolute;width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.35);
  border:2px solid rgba(255,255,255,0.5);
  transform:translate(-50%,-50%);
  pointer-events:none;display:none;
  box-shadow:0 0 12px rgba(255,255,255,0.2);
  transition:opacity 0.1s;
}
/* Direction highlight wedges */
.disc-dir{
  position:absolute;font-size:clamp(0.6rem,2vh,0.9rem);
  color:rgba(255,255,255,0.35);pointer-events:none;
  text-shadow:0 0 4px rgba(0,0,0,0.5);
}
.disc-dir.on{color:rgba(155,188,15,0.9);text-shadow:0 0 8px rgba(155,188,15,0.5)}
.disc-dir.du{top:6%;left:50%;transform:translateX(-50%)}
.disc-dir.dd{bottom:6%;left:50%;transform:translateX(-50%)}
.disc-dir.dl{left:6%;top:50%;transform:translateY(-50%)}
.disc-dir.dr{right:6%;top:50%;transform:translateY(-50%)}

/* Action Buttons — bottom right */
.btn-zone{
  position:absolute;bottom:0;right:5%;width:45%;height:60%;
  display:flex;align-items:flex-end;justify-content:flex-end;
  padding:0 0 max(12px,env(safe-area-inset-bottom)) 0;
  pointer-events:none;
}
.ab{position:relative;pointer-events:auto}
@media(orientation:landscape){
  .ab{width:min(48vh,260px);height:min(48vh,260px)}
}
@media(orientation:portrait){
  .ab{width:min(52vw,260px);height:min(52vw,260px)}
}
.ab-btn{
  position:absolute;border:none;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.06s;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  touch-action:none;
}
.ab-btn:active,.ab-btn.on{transform:scale(0.9)}
/* A — big red, top-right */
.btn-a{
  top:0;right:0;
  width:clamp(84px,24vh,120px);height:clamp(84px,24vh,120px);
  border-radius:50%;font-size:0.8rem;font-weight:bold;
  background:rgba(192,57,43,0.45);border:2px solid rgba(231,76,60,0.5);color:rgba(255,255,255,0.85);
}
.btn-a:active,.btn-a.on{background:rgba(231,76,60,0.8);color:#fff}
/* B — big blue, bottom-left of A */
.btn-b{
  bottom:0;left:0;
  width:clamp(84px,24vh,120px);height:clamp(84px,24vh,120px);
  border-radius:50%;font-size:0.8rem;font-weight:bold;
  background:rgba(41,128,185,0.45);border:2px solid rgba(52,152,219,0.5);color:rgba(255,255,255,0.85);
}
.btn-b:active,.btn-b.on{background:rgba(52,152,219,0.8);color:#fff}
/* Select — small pill, top-right area */
.btn-sel{
  width:clamp(44px,12vw,60px);height:clamp(26px,6vh,34px);
  border-radius:16px;font-size:0.32rem;
  background:rgba(142,68,173,0.45);border:1px solid rgba(155,89,182,0.5);color:rgba(255,255,255,0.8);
}
.btn-sel:active,.btn-sel.on{background:rgba(155,89,182,0.7)}
/* Start — small pill, top-right area */
.btn-start{
  width:clamp(44px,12vw,60px);height:clamp(26px,6vh,34px);
  border-radius:16px;font-size:0.32rem;
  background:rgba(39,174,96,0.45);border:1px solid rgba(46,204,113,0.5);color:rgba(255,255,255,0.8);
}
.btn-start:active,.btn-start.on{background:rgba(46,204,113,0.7)}
/* Start/Select — 1.5x A button height above B and A */
.btn-sel{
  bottom:clamp(214px,61vh,306px) !important;left:0 !important;
}
.btn-start{
  bottom:clamp(214px,61vh,306px) !important;right:0 !important;
}

/* ====== LANDSCAPE HINT ====== */
.rotate-hint{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.92);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.rotate-hint .icon+.txt,.rotate-hint .txt+p{margin-top:16px}
@supports(gap:1px){.rotate-hint .icon+.txt,.rotate-hint .txt+p{margin-top:0}}
.rotate-hint.show{display:flex}
.rotate-hint .icon{font-size:2.5rem;animation:rot-phone 2s ease-in-out infinite}
.rotate-hint .txt{color:#888;font-size:0.4rem;text-align:center;line-height:2}
@keyframes rot-phone{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}

/* ====== PAUSE ====== */
#pause{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.75)}
#pause.show{display:flex}
#pause span{font-size:0.8rem;color:#9bbc0f;animation:blink 1s step-end infinite}

/* Toast */
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(50,50,50,0.95);color:#fff;font-size:0.38rem;padding:8px 16px;border-radius:8px;z-index:400;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}

/* ====== DESKTOP OVERRIDES ====== */
@media(min-width:769px) and (hover:hover){
  .touch-layer{display:none !important}
  .rotate-hint{display:none !important}
  .topbar{opacity:1;pointer-events:auto;background:rgba(0,0,0,0.7)}
}
</style>
</head>
<body>

<div id="boot">
  <h1>🎮 复古掌机<br>ROM Loader</h1>
  <div class="sub">NES / Famicom</div>
  <div class="prompt">TAP TO START</div>
</div>

<div id="menu">
  <h2>— LOAD ROM —</h2>
  <div class="drop-zone" id="dropZone">
    <div class="icon">📂</div>
    <div class="txt">拖拽 <b>.nes</b> ROM 文件到这里<br>或点击选择文件</div>
    <input type="file" id="fileInput" accept=".nes,.NES" />
  </div>
  <div class="hint">
    <p>⌨️ 键盘: <kbd>方向键</kbd>/<kbd>WASD</kbd> 移动, <kbd>X</kbd> A键(跑), <kbd>Z</kbd> B键(跳), <kbd>Enter</kbd> START, <kbd>Ctrl</kbd> SELECT</p>
    <p>📱 手机: 请横屏使用，虚拟按键在画面底部两侧</p>
    <p>🎮 手柄: 接入后自动识别</p>
  </div>
  <div class="recent" id="recentSection" style="display:none">
    <h3>— 最近游玩 —</h3>
    <div class="rom-list" id="romList"></div>
  </div>
</div>

<div class="rotate-hint" id="rotateHint">
  <div class="icon">📱</div>
  <div class="txt">请将手机横屏放置<br>以获得最佳游戏体验</div>
</div>

<div id="shell">
  <!-- Canvas container — absolutely fullscreen -->
  <div id="emu-container"></div>

  <!-- Tap zone to show topbar -->
  <div class="center-tap" id="centerTap"></div>

  <!-- Topbar -->
  <div class="topbar" id="topbar">
    <button class="back" id="backBtn">◀ MENU</button>
    <div class="info" id="romName"></div>
    <div style="display:flex;gap:6px">
      <button class="back" id="infLivesBtn" style="border-color:rgba(241,196,15,0.5);margin-right:6px">♾️ ∞命</button>
      <button class="back" id="saveBtn" style="border-color:rgba(46,204,113,0.5)">💾 SAVE</button>
      <button class="back" id="loadBtn" style="border-color:rgba(52,152,219,0.5)">📂 LOAD</button>
    </div>
  </div>

  <!-- Touch controls overlay -->
  <div class="touch-layer" id="touchLayer">
    <div class="pad-zone">
      <div class="dp" id="dpad">
        <div class="disc" id="disc"></div>
        <div class="disc-dot" id="discDot"></div>
        <span class="disc-dir du" id="ddUp">▲</span>
        <span class="disc-dir dd" id="ddDown">▼</span>
        <span class="disc-dir dl" id="ddLeft">◀</span>
        <span class="disc-dir dr" id="ddRight">▶</span>
      </div>
    </div>
    <div class="btn-zone">
      <div class="ab">
        <button class="ab-btn btn-a" data-key="a">A</button>
        <button class="ab-btn btn-b" data-key="b">B</button>
        <button class="ab-btn btn-sel" data-key="select">SEL</button>
        <button class="ab-btn btn-start" data-key="start">ST</button>
      </div>
    </div>
  </div>

  <div id="pause"><span>⏸ PAUSED</span></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/jsnes@2/dist/jsnes.min.js"></script>
<script>
// ================================================================
//  STATE
// ================================================================
var browser = null;
var topbarTimer = null;

// ================================================================
//  TOAST
// ================================================================
function toast(msg, dur) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(function() { t.classList.remove('show') }, dur || 2000);
}

// ================================================================
//  AUDIO
// ================================================================
var audioReady = false;
function ensureAudio() {
  if (audioReady) return;
  try { var AC = window.AudioContext || window.webkitAudioContext; if (AC) { var c = new AC(); if (c.state === 'suspended') c.resume(); c.close() } } catch(e) {}
  audioReady = true;
}

// ================================================================
//  ORIENTATION
// ================================================================
function isPortrait() { return window.innerHeight > window.innerWidth }
function checkOrientation() {
  var rh = document.getElementById('rotateHint');
  var shell = document.getElementById('shell');
  // Only show rotate hint on mobile/touch devices in portrait during gameplay
  var isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (!shell.classList.contains('active') || !isTouchDevice) { rh.classList.remove('show'); return }
  rh.classList.toggle('show', isPortrait());
}
function tryLockLandscape() {
  try { if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(function(){}) } catch(e) {}
}
function unlockOrientation() {
  try { if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock() } catch(e) {}
}

// ================================================================
//  RESIZE — force canvas to fill viewport after jsnes init
// ================================================================
function resizeEmu() {
  var container = document.getElementById('emu-container');
  var canvas = container.querySelector('canvas');
  if (!canvas) return;
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var scale = Math.min(vw / 256, vh / 240);
  // Use fractional scale for pixel-perfect fit
  canvas.style.width = Math.floor(256 * scale) + 'px';
  canvas.style.height = Math.floor(240 * scale) + 'px';
}

// ================================================================
//  FILE HANDLING
// ================================================================
function handleFile(file) {
  if (!file || !file.name.match(/\.nes$/i)) { toast('请选择 .nes ROM 文件'); return }
  if (file.size > 4 * 1024 * 1024) { toast('文件太大'); return }
  ensureAudio(); toast('加载中...');
  var reader = new FileReader();
  reader.onload = function(e) { startEmulator(e.target.result, file.name) };
  reader.onerror = function() { toast('读取失败') };
  reader.readAsBinaryString(file);
}

function startEmulator(romData, name) {
  // Clean up previous
  if (browser) { try { browser.destroy() } catch(e) {} browser = null }

  var container = document.getElementById('emu-container');
  container.innerHTML = '';

  // IMPORTANT: Make shell visible FIRST so container has dimensions
  document.getElementById('menu').classList.remove('show');
  document.getElementById('shell').classList.add('active');

  // Show touch layer on touch devices
  var isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  var tl = document.getElementById('touchLayer');
  if (isTouchDevice) { tl.style.display = 'block' } else { tl.style.display = 'none' }

  // Small delay to let layout settle, then init jsnes
  setTimeout(function() {
    try {
      browser = new jsnes.Browser({
        container: container, romData: romData,
        onError: function(e) { console.error('NES:', e); toast('模拟器错误') }
      });
    } catch(e) { toast('ROM 加载失败: ' + e.message); return }

    // Force resize after jsnes sets up canvas
    resizeEmu();
    tryLockLandscape();
    checkOrientation();
    showTopbar();
  }, 50);

  document.getElementById('romName').textContent = name;
  currentRomName = name;
  saveRecent(name);
}

// ================================================================
//  TOPBAR
// ================================================================
function showTopbar() {
  var tb = document.getElementById('topbar');
  tb.classList.add('show');
  clearTimeout(topbarTimer);
  topbarTimer = setTimeout(function() { tb.classList.remove('show') }, 3000);
}

// ================================================================
//  RECENT ROMs
// ================================================================
var STORAGE_KEY = 'retro-console-recent';
function getRecentList() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [] } catch(e) { return [] } }
function saveRecent(name) {
  var list = getRecentList().filter(function(n) { return n !== name });
  list.unshift(name); if (list.length > 8) list = list.slice(0, 8);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)) } catch(e) {}
  renderRecent();
}
function renderRecent() {
  var list = getRecentList();
  var sec = document.getElementById('recentSection');
  var el = document.getElementById('romList');
  if (!list.length) { sec.style.display = 'none'; return }
  sec.style.display = 'block'; el.innerHTML = '';
  list.forEach(function(name) {
    var div = document.createElement('div');
    div.className = 'rom-item';
    div.innerHTML = '<div class="ri">🎮</div><div><div class="rn">' + esc(name) + '</div><div class="rs">重新选择文件加载</div></div>';
    div.addEventListener('click', function() { document.getElementById('fileInput').click() });
    el.appendChild(div);
  });
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

// ================================================================
//  CONTROLS — jsnes native API for touch, keyboard events for keys
// ================================================================
var BTN = { up:0x10, down:0x20, left:0x40, right:0x80, a:0x01, b:0x02, select:0x04, start:0x08 };
var keyCodeMap = { up:38, down:40, left:37, right:39, a:88, b:90, start:13, select:17 };

function nesBtnDown(btn) { if (browser && browser.nes && browser.nes.controller1) browser.nes.controller1.buttonDown(btn) }
function nesBtnUp(btn) { if (browser && browser.nes && browser.nes.controller1) browser.nes.controller1.buttonUp(btn) }

function fireKey(type, kc) {
  document.dispatchEvent(new KeyboardEvent(type, { keyCode:kc, which:kc, key:'', bubbles:true }));
}

// --- Directional disc: touch anywhere on the circle to set direction ---
var discDirs = { up:false, down:false, left:false, right:false };

function discSetDir(dir, on) {
  if (discDirs[dir] === on) return;
  discDirs[dir] = on;
  var kc = keyCodeMap[dir];
  var btn = BTN[dir];
  if (on) { nesBtnDown(btn); fireKey('keydown', kc) }
  else    { nesBtnUp(btn);   fireKey('keyup', kc) }
  // Highlight indicator
  var map = { up:'ddUp', down:'ddDown', left:'ddLeft', right:'ddRight' };
  var el = document.getElementById(map[dir]);
  if (el) { if (on) el.classList.add('on'); else el.classList.remove('on') }
}

function discClearAll() {
  ['up','down','left','right'].forEach(function(d) { discSetDir(d, false) });
  var dot = document.getElementById('discDot');
  if (dot) dot.style.display = 'none';
}

function discFromXY(x, y) {
  var el = document.getElementById('dpad');
  var rect = el.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top + rect.height / 2;
  var dx = x - cx;
  var dy = y - cy;
  var r = Math.min(rect.width, rect.height) / 2;
  var dist = Math.sqrt(dx * dx + dy * dy);

  // Show thumb dot
  var dot = document.getElementById('discDot');
  if (dot) {
    // Clamp dot inside circle
    var maxDist = r - 18;
    var showDist = Math.min(dist, maxDist);
    var angle = Math.atan2(dy, dx);
    dot.style.left = (rect.width / 2 + Math.cos(angle) * showDist) + 'px';
    dot.style.top = (rect.height / 2 + Math.sin(angle) * showDist) + 'px';
    dot.style.display = 'block';
  }

  // Dead zone: inner 20% radius = no direction
  var deadZone = r * 0.2;
  if (dist < deadZone) { discClearAll(); return }

  // Angle in degrees (0=right, 90=down, 180/-180=left, -90=up)
  var deg = Math.atan2(dy, dx) * 180 / Math.PI;
  // Map to 8 octants: each 45°, offset by 22.5°
  // Sector 0: -22.5 to 22.5 → right
  // Sector 1: 22.5 to 67.5 → down-right
  // Sector 2: 67.5 to 112.5 → down
  // ... etc
  var sector = Math.round(((deg + 180) % 360 + 360) % 360 / 45) % 8;
  // Sectors: 0=left, 1=up-left, 2=up, 3=up-right, 4=right, 5=down-right, 6=down, 7=down-left
  discSetDir('right', sector === 3 || sector === 4 || sector === 5);
  discSetDir('down',  sector === 5 || sector === 6 || sector === 7);
  discSetDir('left',  sector === 7 || sector === 0 || sector === 1);
  discSetDir('up',    sector === 1 || sector === 2 || sector === 3);
}

function bindDisc() {
  var disc = document.getElementById('disc');
  // Touch events
  disc.addEventListener('touchstart', function(e) {
    e.preventDefault(); e.stopPropagation();
    var t = e.touches[0]; discFromXY(t.clientX, t.clientY);
  }, { passive: false });
  disc.addEventListener('touchmove', function(e) {
    e.preventDefault(); e.stopPropagation();
    var t = e.touches[0]; discFromXY(t.clientX, t.clientY);
  }, { passive: false });
  disc.addEventListener('touchend', function(e) {
    e.preventDefault(); e.stopPropagation();
    if (e.touches.length === 0) discClearAll();
  }, { passive: false });
  disc.addEventListener('touchcancel', function(e) {
    e.preventDefault(); e.stopPropagation();
    discClearAll();
  }, { passive: false });
  // Mouse events
  var mouseDown = false;
  disc.addEventListener('mousedown', function(e) {
    e.preventDefault(); mouseDown = true; discFromXY(e.clientX, e.clientY);
  });
  document.addEventListener('mousemove', function(e) {
    if (mouseDown) discFromXY(e.clientX, e.clientY);
  });
  document.addEventListener('mouseup', function() {
    if (mouseDown) { mouseDown = false; discClearAll() }
  });
}

function bindTouchControls() {
  // Bind A/B/Select/Start (non-direction buttons still use data-key)
  document.querySelectorAll('[data-key]').forEach(function(el) {
    var k = el.getAttribute('data-key');
    if (k === 'up' || k === 'down' || k === 'left' || k === 'right') return; // handled by disc
    var btn = BTN[k]; if (btn === undefined) return;
    var kc = keyCodeMap[k];
    function dn(e) { e.preventDefault(); e.stopPropagation(); el.classList.add('on'); nesBtnDown(btn); fireKey('keydown',kc) }
    function up(e) { e.preventDefault(); e.stopPropagation(); el.classList.remove('on'); nesBtnUp(btn); fireKey('keyup',kc) }
    el.addEventListener('touchstart', dn, { passive:false });
    el.addEventListener('touchend', up, { passive:false });
    el.addEventListener('touchcancel', up, { passive:false });
    el.addEventListener('mousedown', dn);
    el.addEventListener('mouseup', up);
    el.addEventListener('mouseleave', up);
  });
  // Bind the directional disc
  bindDisc();
}
// WASD
var wasdMap = { w:38, s:40, a:37, d:39 };
document.addEventListener('keydown', function(e) { var kc=wasdMap[e.key]; if(kc!==undefined){e.preventDefault();fireKey('keydown',kc)} });
document.addEventListener('keyup', function(e) { var kc=wasdMap[e.key]; if(kc!==undefined){e.preventDefault();fireKey('keyup',kc)} });

// Pause
var paused = false;
function togglePause() { paused = !paused; document.getElementById('pause').classList.toggle('show', paused) }
document.addEventListener('keydown', function(e) {
  if ((e.key === 'p' || e.key === 'Escape') && document.getElementById('shell').classList.contains('active')) togglePause();
  if (e.key === 's' || e.key === 'S') { if (document.getElementById('shell').classList.contains('active')) { e.preventDefault(); saveState(); showTopbar() } }
  if (e.key === 'l' || e.key === 'L') { if (document.getElementById('shell').classList.contains('active')) { e.preventDefault(); loadState(); showTopbar() } }
});

// ================================================================
//  SAVE / LOAD
// ================================================================
var currentRomName = '';
var SAVE_KEY = 'retro-console-save-';

function saveState() {
  if (!browser || !browser.nes) { toast('没有运行中的游戏'); return }
  try {
    var state = browser.nes.toJSON();
    var key = SAVE_KEY + currentRomName;
    localStorage.setItem(key, JSON.stringify(state));
    toast('💾 已存档', 1500);
  } catch(e) { toast('存档失败: ' + e.message) }
}

function loadState() {
  if (!browser || !browser.nes) { toast('没有运行中的游戏'); return }
  var key = SAVE_KEY + currentRomName;
  try {
    var raw = localStorage.getItem(key);
    if (!raw) { toast('没有找到存档'); return }
    var state = JSON.parse(raw);
    browser.nes.fromJSON(state);
    toast('📂 已读档', 1500);
  } catch(e) { toast('读档失败: ' + e.message) }
}

// ================================================================
//  INFINITE LIVES — game-specific addresses, poke only when toggled
// ================================================================
var infLivesOn = false;
var infLivesPoked = false;

// Game-specific cheat profiles: { lives: addr, livesVal, hp: [addrs], hpVal }
var CHEAT_PROFILES = {
  contra:     { lives: 0x0032, livesVal: 0x0A, hp: [], hpVal: 0 },
  mario:      { lives: 0x075A, livesVal: 0x08, hp: [], hpVal: 0 },
  megaman:    { lives: 0x00A6, livesVal: 0x09, hp: [0x006C], hpVal: 0x1C },
  castlevania:{ lives: 0x0048, livesVal: 0x09, hp: [0x0045], hpVal: 0xFF },
  tmnt:       { lives: 0x0091, livesVal: 0x09, hp: [0x0092], hpVal: 0xFF },
  doubledragon:{ lives: 0x0074, livesVal: 0x09, hp: [0x0075], hpVal: 0x20 },
  ninjagaiden:{ lives: 0x0091, livesVal: 0x09, hp: [0x007E], hpVal: 0x10 },
  ducktales:  { lives: 0x006F, livesVal: 0x09, hp: [], hpVal: 0 },
  chipdale:   { lives: 0x0068, livesVal: 0x09, hp: [], hpVal: 0 },
  battlecity: { lives: 0x0009, livesVal: 0x09, hp: [], hpVal: 0 },
  bomberman:  { lives: 0x0040, livesVal: 0x09, hp: [], hpVal: 0 },
  gradius:    { lives: 0x0058, livesVal: 0x09, hp: [0x0048], hpVal: 0x04 },
  galaga:     { lives: 0x0061, livesVal: 0x09, hp: [], hpVal: 0 },
  default:    null // disabled for unknown games — user can still try
};

var currentCheat = null;

function detectGame(name) {
  var n = name.toLowerCase();
  if (/contra|魂斗罗/.test(n)) return 'contra';
  if (/mario|马里奥|超级玛/.test(n)) return 'mario';
  if (/rockman|洛克人|megaman/.test(n)) return 'megaman';
  if (/castlevania|恶魔城/.test(n)) return 'castlevania';
  if (/tmnt|忍者龟|神龟/.test(n)) return 'tmnt';
  if (/double.?dragon|双截龙/.test(n)) return 'doubledragon';
  if (/ninja.?gaiden|忍者龙剑/.test(n)) return 'ninjagaiden';
  if (/duck.?tales|唐老鸭/.test(n)) return 'ducktales';
  if (/chip.*dale|松鼠/.test(n)) return 'chipdale';
  if (/battle.?city|坦克大战/.test(n)) return 'battlecity';
  if (/bomber|炸弹人/.test(n)) return 'bomberman';
  if (/gradius|宇宙巡航/.test(n)) return 'gradius';
  if (/galaga/.test(n)) return 'galaga';
  return 'default';
}

function applyInfLivesOnce() {
  if (!browser || !browser.nes || !browser.nes.cpu) return;
  var mem = browser.nes.cpu.mem;
  var c = currentCheat;
  if (!c) return;
  mem[c.lives] = c.livesVal;
  for (var i = 0; i < c.hp.length; i++) {
    mem[c.hp[i]] = c.hpVal;
  }
  infLivesPoked = true;
}

// ================================================================
//  INIT
// ================================================================
bindTouchControls();
renderRecent();

document.getElementById('boot').addEventListener('click', function() {
  ensureAudio(); this.classList.add('hide');
  setTimeout(function() { document.getElementById('boot').style.display = 'none' }, 500);
  document.getElementById('menu').classList.add('show');
});

var dz = document.getElementById('dropZone');
dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('over') });
dz.addEventListener('dragleave', function() { dz.classList.remove('over') });
dz.addEventListener('drop', function(e) { e.preventDefault(); dz.classList.remove('over'); var f = e.dataTransfer.files[0]; if (f) handleFile(f) });
document.getElementById('fileInput').addEventListener('change', function(e) { var f = e.target.files[0]; if (f) handleFile(f); this.value = '' });

document.getElementById('saveBtn').addEventListener('click', function() { saveState(); showTopbar() });
document.getElementById('loadBtn').addEventListener('click', function() { loadState(); showTopbar() });
// Infinite lives toggle
document.getElementById('infLivesBtn').addEventListener('click', function() {
  infLivesOn = !infLivesOn;
  infLivesPoked = false;
  this.style.borderColor = infLivesOn ? '#9bbc0f' : 'rgba(241,196,15,0.5)';
  this.style.color = infLivesOn ? '#9bbc0f' : '#ccc';
  this.style.background = infLivesOn ? 'rgba(155,188,15,0.15)' : 'transparent';
  if (infLivesOn) {
    currentCheat = CHEAT_PROFILES[detectGame(currentRomName)];
    if (!currentCheat) {
      infLivesOn = false;
      this.style.borderColor = 'rgba(241,196,15,0.5)';
      this.style.color = '#ccc';
      this.style.background = 'transparent';
      toast('⚠️ 不支持该游戏，地址未知');
    } else {
      toast('♾️ 无限命 ON (' + currentRomName + ')');
    }
  } else {
    currentCheat = null;
    toast('♾️ 无限命 OFF');
  }
  showTopbar();
});

// Apply cheats every 500ms — monitor lives and re-poke if decreased
setInterval(function() {
  if (!infLivesOn || !currentCheat || !browser || !browser.nes || paused) return;
  var mem = browser.nes.cpu.mem;
  var livesAddr = currentCheat.lives;
  if (mem[livesAddr] < currentCheat.livesVal) {
    mem[livesAddr] = currentCheat.livesVal;
  }
  for (var i = 0; i < currentCheat.hp.length; i++) {
    var addr = currentCheat.hp[i];
    if (mem[addr] < currentCheat.hpVal) {
      mem[addr] = currentCheat.hpVal;
    }
  }
}, 500);

document.getElementById('centerTap').addEventListener('click', function() { showTopbar() });
document.getElementById('backBtn').addEventListener('click', function() {
  if (browser) { try { browser.destroy() } catch(e) {} browser = null }
  paused = false;
  document.getElementById('pause').classList.remove('show');
  document.getElementById('shell').classList.remove('active');
  document.getElementById('emu-container').innerHTML = '';
  document.getElementById('menu').classList.add('show');
  unlockOrientation();
  document.getElementById('rotateHint').classList.remove('show');
});

window.addEventListener('resize', function() {
  if (document.getElementById('shell').classList.contains('active')) { resizeEmu(); checkOrientation() }
});
window.addEventListener('orientationchange', function() {
  setTimeout(function() { resizeEmu(); checkOrientation() }, 150);
});

document.addEventListener('touchmove', function(e) { e.preventDefault() }, { passive: false });
</script>
