<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>🎮 复古掌机 · ROM Loader</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Press Start 2P',monospace}

/* ====== BOOT ====== */
#boot{position:fixed;inset:0;z-index:200;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s}
#boot.hide{opacity:0;pointer-events:none}
#boot h1{font-size:clamp(0.9rem,3.5vw,1.4rem);color:#9bbc0f;text-shadow:0 0 20px rgba(155,188,15,0.5);line-height:2.2;margin-bottom:16px;text-align:center}
#boot .sub{color:#306230;font-size:0.5rem;margin-bottom:30px}
#boot .prompt{color:#306230;font-size:0.6rem;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}

/* ====== MENU ====== */
#menu{position:fixed;inset:0;z-index:100;background:#111;display:none;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;padding:20px}
#menu.show{display:flex}
#menu h2{font-size:0.7rem;color:#9bbc0f;margin-bottom:20px;text-shadow:0 0 10px rgba(155,188,15,0.3)}
.drop-zone{width:min(90%,420px);min-height:180px;border:3px dashed #333;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:28px 20px;transition:all 0.2s;cursor:pointer;position:relative}
.drop-zone.over{border-color:#9bbc0f;background:rgba(155,188,15,0.06);transform:scale(1.02)}
.drop-zone .icon{font-size:2.2rem}
.drop-zone .txt{color:#666;font-size:0.45rem;line-height:2.2;text-align:center}
.drop-zone .txt b{color:#9bbc0f}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.hint{width:min(90%,420px);margin-top:16px;padding:12px 14px;background:#1a1a1a;border-radius:8px;border:1px solid #222}
.hint p{color:#555;font-size:0.35rem;line-height:2}
.hint kbd{background:#333;color:#9bbc0f;padding:1px 5px;border-radius:3px;font-size:0.3rem}
.recent{width:min(90%,420px);margin-top:18px}
.recent h3{font-size:0.45rem;color:#666;margin-bottom:10px}
.rom-list{display:flex;flex-direction:column;gap:8px;max-height:160px;overflow-y:auto}
.rom-item{background:#1a1a1a;border:2px solid #333;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.15s}
.rom-item:active,.rom-item:hover{background:#222;border-color:#9bbc0f;transform:scale(0.98)}
.rom-item .ri{font-size:1.2rem}
.rom-item .rn{font-size:0.42rem;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px}
.rom-item .rs{font-size:0.32rem;color:#666;margin-top:3px}

/* ====== GAME SHELL — TRUE FULLSCREEN ====== */
#shell{display:none;position:fixed;inset:0;z-index:100;background:#000}
#shell.active{display:block}

/* Canvas fills entire viewport */
#emu-container{position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
#emu-container canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}

/* Top bar — fades in/out */
.topbar{
  position:absolute;top:0;left:0;right:0;height:40px;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 max(12px,env(safe-area-inset-left)) 0 max(12px,env(safe-area-inset-right));
  background:linear-gradient(to bottom,rgba(0,0,0,0.85),transparent);
  transition:opacity 0.3s;opacity:0;pointer-events:none;
}
.topbar.show{opacity:1;pointer-events:auto}
.topbar .back{color:#ccc;font-size:0.4rem;cursor:pointer;padding:6px 12px;border:1px solid rgba(255,255,255,0.3);border-radius:8px;background:rgba(0,0,0,0.4);font-family:inherit}
.topbar .back:active{background:rgba(255,255,255,0.15)}
.topbar .info{color:#9bbc0f;font-size:0.35rem;text-shadow:0 1px 4px rgba(0,0,0,0.9);max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Center tap zone to show topbar */
.center-tap{position:absolute;top:0;left:25%;right:25%;height:15%;z-index:45;pointer-events:auto;cursor:pointer}

/* ====== TOUCH CONTROLS — OVERLAY GAMEPAD ====== */
.touch-layer{position:absolute;inset:0;z-index:40;pointer-events:none}

/* D-Pad — bottom left */
.pad-zone{
  position:absolute;bottom:0;left:0;width:50%;height:60%;
  display:flex;align-items:flex-end;justify-content:flex-start;
  padding:0 0 max(12px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));
  pointer-events:none;
}
.dp{position:relative;pointer-events:auto}
/* Size relative to viewport height */
@media(orientation:landscape){
  .dp{width:min(32vh,180px);height:min(32vh,180px)}
}
@media(orientation:portrait){
  .dp{width:min(35vw,180px);height:min(35vw,180px)}
}
.db{
  position:absolute;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.5);font-size:clamp(0.8rem,2.5vh,1.2rem);
  cursor:pointer;transition:background 0.06s;
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
}
.db:active,.db.on{background:rgba(255,255,255,0.3);color:#fff;border-color:rgba(255,255,255,0.5)}
.du{top:0;left:50%;transform:translateX(-50%);width:40%;height:34%;border-radius:14px 14px 6px 6px}
.dd{bottom:0;left:50%;transform:translateX(-50%);width:40%;height:34%;border-radius:6px 6px 14px 14px}
.dl{top:50%;left:0;transform:translateY(-50%);width:34%;height:40%;border-radius:14px 6px 6px 14px}
.dr{top:50%;right:0;transform:translateY(-50%);width:34%;height:40%;border-radius:6px 14px 14px 6px}
.dc{top:50%;left:50%;transform:translate(-50%,-50%);width:32%;height:32%;background:rgba(255,255,255,0.03);border:none;pointer-events:none;border-radius:50%}

/* Action Buttons — bottom right */
.btn-zone{
  position:absolute;bottom:0;right:0;width:50%;height:60%;
  display:flex;align-items:flex-end;justify-content:flex-end;
  padding:0 max(12px,env(safe-area-inset-right)) max(12px,env(safe-area-inset-bottom)) 0;
  pointer-events:none;
}
.ab{position:relative;pointer-events:auto}
@media(orientation:landscape){
  .ab{width:min(34vh,190px);height:min(34vh,190px)}
}
@media(orientation:portrait){
  .ab{width:min(38vw,190px);height:min(38vw,190px)}
}
.ab-btn{
  position:absolute;border:none;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.06s;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
}
.ab-btn:active,.ab-btn.on{transform:scale(0.9)}
/* A — big red, top-right */
.btn-a{
  top:0;right:0;
  width:clamp(50px,14vh,72px);height:clamp(50px,14vh,72px);
  border-radius:50%;font-size:0.7rem;font-weight:bold;
  background:rgba(192,57,43,0.45);border:2px solid rgba(231,76,60,0.5);color:rgba(255,255,255,0.85);
}
.btn-a:active,.btn-a.on{background:rgba(231,76,60,0.8);color:#fff}
/* B — big blue, bottom-left */
.btn-b{
  bottom:8%;left:0;
  width:clamp(50px,14vh,72px);height:clamp(50px,14vh,72px);
  border-radius:50%;font-size:0.7rem;font-weight:bold;
  background:rgba(41,128,185,0.45);border:2px solid rgba(52,152,219,0.5);color:rgba(255,255,255,0.85);
}
.btn-b:active,.btn-b.on{background:rgba(52,152,219,0.8);color:#fff}
/* Select — small pill */
.btn-sel{
  bottom:50%;left:50%;transform:translate(-50%,50%);
  width:clamp(38px,10vw,52px);height:clamp(20px,5vh,28px);
  border-radius:14px;font-size:0.28rem;
  background:rgba(142,68,173,0.4);border:1px solid rgba(155,89,182,0.4);color:rgba(255,255,255,0.7);
}
.btn-sel:active,.btn-sel.on{background:rgba(155,89,182,0.7)}
/* Start — small pill */
.btn-start{
  top:15%;left:50%;transform:translateX(-50%);
  width:clamp(38px,10vw,52px);height:clamp(20px,5vh,28px);
  border-radius:14px;font-size:0.28rem;
  background:rgba(39,174,96,0.4);border:1px solid rgba(46,204,113,0.4);color:rgba(255,255,255,0.7);
}
.btn-start:active,.btn-start.on{background:rgba(46,204,113,0.7)}

/* ====== LANDSCAPE HINT ====== */
.rotate-hint{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.92);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.rotate-hint.show{display:flex}
.rotate-hint .icon{font-size:2.5rem;animation:rot-phone 2s ease-in-out infinite}
.rotate-hint .txt{color:#888;font-size:0.4rem;text-align:center;line-height:2}
@keyframes rot-phone{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}

/* ====== PAUSE ====== */
#pause{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.75)}
#pause.show{display:flex}
#pause span{font-size:0.8rem;color:#9bbc0f;animation:blink 1s step-end infinite}

/* Toast */
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(50,50,50,0.95);color:#fff;font-size:0.38rem;padding:8px 16px;border-radius:8px;z-index:400;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}

/* ====== DESKTOP OVERRIDES ====== */
@media(min-width:769px) and (hover:hover){
  .touch-layer{display:none !important}
  .rotate-hint{display:none !important}
  .topbar{opacity:1;pointer-events:auto;background:rgba(0,0,0,0.7)}
}
</style>
</head>
<body>

<div id="boot">
  <h1>🎮 复古掌机<br>ROM Loader</h1>
  <div class="sub">NES / Famicom</div>
  <div class="prompt">TAP TO START</div>
</div>

<div id="menu">
  <h2>— LOAD ROM —</h2>
  <div class="drop-zone" id="dropZone">
    <div class="icon">📂</div>
    <div class="txt">拖拽 <b>.nes</b> ROM 文件到这里<br>或点击选择文件</div>
    <input type="file" id="fileInput" accept=".nes,.NES" />
  </div>
  <div class="hint">
    <p>⌨️ 键盘: <kbd>方向键</kbd>/<kbd>WASD</kbd> 移动, <kbd>X</kbd> A键(跑), <kbd>Z</kbd> B键(跳), <kbd>Enter</kbd> START, <kbd>Ctrl</kbd> SELECT</p>
    <p>📱 手机: 请横屏使用，虚拟按键在画面底部两侧</p>
    <p>🎮 手柄: 接入后自动识别</p>
  </div>
  <div class="recent" id="recentSection" style="display:none">
    <h3>— 最近游玩 —</h3>
    <div class="rom-list" id="romList"></div>
  </div>
</div>

<div class="rotate-hint" id="rotateHint">
  <div class="icon">📱</div>
  <div class="txt">请将手机横屏放置<br>以获得最佳游戏体验</div>
</div>

<div id="shell">
  <!-- Canvas container — absolutely fullscreen -->
  <div id="emu-container"></div>

  <!-- Tap zone to show topbar -->
  <div class="center-tap" id="centerTap"></div>

  <!-- Topbar -->
  <div class="topbar" id="topbar">
    <button class="back" id="backBtn">◀ MENU</button>
    <div class="info" id="romName"></div>
  </div>

  <!-- Touch controls overlay -->
  <div class="touch-layer" id="touchLayer">
    <div class="pad-zone">
      <div class="dp">
        <div class="db du" data-key="up">▲</div>
        <div class="db dd" data-key="down">▼</div>
        <div class="db dl" data-key="left">◀</div>
        <div class="db dr" data-key="right">▶</div>
        <div class="dc"></div>
      </div>
    </div>
    <div class="btn-zone">
      <div class="ab">
        <button class="ab-btn btn-a" data-key="a">A</button>
        <button class="ab-btn btn-b" data-key="b">B</button>
        <button class="ab-btn btn-sel" data-key="select">SEL</button>
        <button class="ab-btn btn-start" data-key="start">ST</button>
      </div>
    </div>
  </div>

  <div id="pause"><span>⏸ PAUSED</span></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/jsnes@2/dist/jsnes.min.js"></script>
<script>
// ================================================================
//  STATE
// ================================================================
var browser = null;
var topbarTimer = null;

// ================================================================
//  TOAST
// ================================================================
function toast(msg, dur) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(function() { t.classList.remove('show') }, dur || 2000);
}

// ================================================================
//  AUDIO
// ================================================================
var audioReady = false;
function ensureAudio() {
  if (audioReady) return;
  try { var AC = window.AudioContext || window.webkitAudioContext; if (AC) { var c = new AC(); if (c.state === 'suspended') c.resume(); c.close() } } catch(e) {}
  audioReady = true;
}

// ================================================================
//  ORIENTATION
// ================================================================
function isPortrait() { return window.innerHeight > window.innerWidth }
function checkOrientation() {
  var rh = document.getElementById('rotateHint');
  var shell = document.getElementById('shell');
  // Only show rotate hint on mobile/touch devices in portrait during gameplay
  var isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (!shell.classList.contains('active') || !isTouchDevice) { rh.classList.remove('show'); return }
  rh.classList.toggle('show', isPortrait());
}
function tryLockLandscape() {
  try { if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(function(){}) } catch(e) {}
}
function unlockOrientation() {
  try { if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock() } catch(e) {}
}

// ================================================================
//  RESIZE — force canvas to fill viewport after jsnes init
// ================================================================
function resizeEmu() {
  var container = document.getElementById('emu-container');
  var canvas = container.querySelector('canvas');
  if (!canvas) return;
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var scale = Math.min(vw / 256, vh / 240);
  // Use fractional scale for pixel-perfect fit
  canvas.style.width = Math.floor(256 * scale) + 'px';
  canvas.style.height = Math.floor(240 * scale) + 'px';
}

// ================================================================
//  FILE HANDLING
// ================================================================
function handleFile(file) {
  if (!file || !file.name.match(/\.nes$/i)) { toast('请选择 .nes ROM 文件'); return }
  if (file.size > 4 * 1024 * 1024) { toast('文件太大'); return }
  ensureAudio(); toast('加载中...');
  var reader = new FileReader();
  reader.onload = function(e) { startEmulator(e.target.result, file.name) };
  reader.onerror = function() { toast('读取失败') };
  reader.readAsBinaryString(file);
}

function startEmulator(romData, name) {
  // Clean up previous
  if (browser) { try { browser.destroy() } catch(e) {} browser = null }

  var container = document.getElementById('emu-container');
  container.innerHTML = '';

  // IMPORTANT: Make shell visible FIRST so container has dimensions
  document.getElementById('menu').classList.remove('show');
  document.getElementById('shell').classList.add('active');

  // Show touch layer on touch devices
  var isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  var tl = document.getElementById('touchLayer');
  if (isTouchDevice) { tl.style.display = 'block' } else { tl.style.display = 'none' }

  // Small delay to let layout settle, then init jsnes
  setTimeout(function() {
    try {
      browser = new jsnes.Browser({
        container: container, romData: romData,
        onError: function(e) { console.error('NES:', e); toast('模拟器错误') }
      });
    } catch(e) { toast('ROM 加载失败: ' + e.message); return }

    // Force resize after jsnes sets up canvas
    resizeEmu();
    tryLockLandscape();
    checkOrientation();
    showTopbar();
  }, 50);

  document.getElementById('romName').textContent = name;
  saveRecent(name);
}

// ================================================================
//  TOPBAR
// ================================================================
function showTopbar() {
  var tb = document.getElementById('topbar');
  tb.classList.add('show');
  clearTimeout(topbarTimer);
  topbarTimer = setTimeout(function() { tb.classList.remove('show') }, 3000);
}

// ================================================================
//  RECENT ROMs
// ================================================================
var STORAGE_KEY = 'retro-console-recent';
function getRecentList() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [] } catch(e) { return [] } }
function saveRecent(name) {
  var list = getRecentList().filter(function(n) { return n !== name });
  list.unshift(name); if (list.length > 8) list = list.slice(0, 8);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)) } catch(e) {}
  renderRecent();
}
function renderRecent() {
  var list = getRecentList();
  var sec = document.getElementById('recentSection');
  var el = document.getElementById('romList');
  if (!list.length) { sec.style.display = 'none'; return }
  sec.style.display = 'block'; el.innerHTML = '';
  list.forEach(function(name) {
    var div = document.createElement('div');
    div.className = 'rom-item';
    div.innerHTML = '<div class="ri">🎮</div><div><div class="rn">' + esc(name) + '</div><div class="rs">重新选择文件加载</div></div>';
    div.addEventListener('click', function() { document.getElementById('fileInput').click() });
    el.appendChild(div);
  });
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

// ================================================================
//  CONTROLS
// ================================================================
var keyCodeMap = { up: 38, down: 40, left: 37, right: 39, a: 88, b: 90, start: 13, select: 17 };
function fireKey(type, kc) {
  document.dispatchEvent(new KeyboardEvent(type, { keyCode: kc, which: kc, key: '', bubbles: true }));
}
function bindTouchControls() {
  document.querySelectorAll('[data-key]').forEach(function(el) {
    var k = el.getAttribute('data-key');
    var kc = keyCodeMap[k]; if (!kc) return;
    function dn(e) { e.preventDefault(); e.stopPropagation(); el.classList.add('on'); fireKey('keydown', kc) }
    function up(e) { e.preventDefault(); e.stopPropagation(); el.classList.remove('on'); fireKey('keyup', kc) }
    el.addEventListener('touchstart', dn, { passive: false });
    el.addEventListener('touchend', up, { passive: false });
    el.addEventListener('touchcancel', up, { passive: false });
    el.addEventListener('mousedown', dn);
    el.addEventListener('mouseup', up);
    el.addEventListener('mouseleave', up);
  });
}
// WASD
var wasdMap = { w: 38, s: 40, a: 37, d: 39 };
document.addEventListener('keydown', function(e) { var kc = wasdMap[e.key]; if (kc !== undefined) { e.preventDefault(); fireKey('keydown', kc) } });
document.addEventListener('keyup', function(e) { var kc = wasdMap[e.key]; if (kc !== undefined) { e.preventDefault(); fireKey('keyup', kc) } });

// Pause
var paused = false;
function togglePause() { paused = !paused; document.getElementById('pause').classList.toggle('show', paused) }
document.addEventListener('keydown', function(e) {
  if ((e.key === 'p' || e.key === 'Escape') && document.getElementById('shell').classList.contains('active')) togglePause();
});

// ================================================================
//  INIT
// ================================================================
bindTouchControls();
renderRecent();

document.getElementById('boot').addEventListener('click', function() {
  ensureAudio(); this.classList.add('hide');
  setTimeout(function() { document.getElementById('boot').style.display = 'none' }, 500);
  document.getElementById('menu').classList.add('show');
});

var dz = document.getElementById('dropZone');
dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('over') });
dz.addEventListener('dragleave', function() { dz.classList.remove('over') });
dz.addEventListener('drop', function(e) { e.preventDefault(); dz.classList.remove('over'); var f = e.dataTransfer.files[0]; if (f) handleFile(f) });
document.getElementById('fileInput').addEventListener('change', function(e) { var f = e.target.files[0]; if (f) handleFile(f); this.value = '' });

document.getElementById('centerTap').addEventListener('click', function() { showTopbar() });
document.getElementById('backBtn').addEventListener('click', function() {
  if (browser) { try { browser.destroy() } catch(e) {} browser = null }
  paused = false;
  document.getElementById('pause').classList.remove('show');
  document.getElementById('shell').classList.remove('active');
  document.getElementById('emu-container').innerHTML = '';
  document.getElementById('menu').classList.add('show');
  unlockOrientation();
  document.getElementById('rotateHint').classList.remove('show');
});

window.addEventListener('resize', function() {
  if (document.getElementById('shell').classList.contains('active')) { resizeEmu(); checkOrientation() }
});
window.addEventListener('orientationchange', function() {
  setTimeout(function() { resizeEmu(); checkOrientation() }, 150);
});

document.addEventListener('touchmove', function(e) { e.preventDefault() }, { passive: false });
</script>
</body>
</html>
